<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gift Card</title>
    <link
      rel="icon"
      href="https://akm-img-a-in.tosshub.com/businesstoday/images/story/202106/boat_1200_080621082427.jpg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./styles/footer.css" />
    <link rel="stylesheet" href="./styles/giftcard.css" />
  </head>

  <body>
    <div id="main_navbar"></div>

    <div id="topBox">
      <div id="box1">
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/products/Gift-Card-500_72x.png?v=1615270910"
          alt="Gift Card 500"
        />
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/products/Gift-Card-1000_72x.png?v=1615270910"
          alt="Gift Card 1000"
        />
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/products/Gift-Card-2000_72x.png?v=1615270911"
          alt="Gift Card 2000"
        />
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/products/Gift-card-5000_72x.png?v=1615270911"
          alt="Gift Card 5000"
        />
      </div>
      <div id="box2">
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/products/Gift-Card-2000_612x.png?v=1615270911"
          alt="Highlighted Gift Card"
        />
      </div>
      <div id="box3">
        <h1>Gift Card</h1>
        <div class="sbox1">
          <div>
            <p>&#9734; &#9734; &#9734; &#9734; &#9734;</p>
            <p>5.0 | 32 Reviews</p>
            <img
              src="https://via.placeholder.com/150"
              alt="Reviews Placeholder"
            />
          </div>
        </div>
        <h2>Denominations: &#8377;500</h2>
        <div id="sbox2">
          <div class="price1">
            <h3>&#8377; 500</h3>
            <h3>&#8377; 1000</h3>
          </div>
          <div class="price2">
            <h3>&#8377; 2000</h3>
            <h3>&#8377; 5000</h3>
          </div>
        </div>
      </div>
      <div id="box4">
        <h1>&#8377; 500</h1>
        <p>Inclusive of all taxes</p>
        <div class="stock">
          <h1>In Stock</h1>
          <p>Currently in 291 carts</p>
        </div>
        <button>Add to Cart</button>
      </div>
    </div>

    <footer>
      <p>&copy; 2024 Gift Card Shop</p>
    </footer>
  </body>
</html>

<script type="MODULE">
  import main_navbar from "./components.js";
  let container = document.getElementById("main_navbar");
  let navbar = main_navbar();
  container.innerHTML = navbar;

  import {footer} from "./footer.js"
  document.getElementById("footer_part").innerHTML = footer();
</script>
