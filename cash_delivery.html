<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash On Delivery</title>
  <link rel="stylesheet" href="./styles/cash.css" />
  <link rel="stylesheet" href="./styles/opt.css" />
</head>

<body>
  <header id="top">
    <p>All your favourite boAt products at heavy bargains. Shop NOW!</p>
  </header>

  <nav id="navbar">
    <div>
      <a href="index.html">
        <img
          src="https://cdn.shopify.com/s/files/1/0057/8938/4802/files/Boat-Logo_200x_200x_f9c79bf9-9c9a-477d-ab6a-7c889a1f2f70_170x.png?v=1646731229"
          alt="boAt Logo" />
      </a>
    </div>
    <div>
      <select id="shop">
        <option value="">Shop</option>
      </select>
      <span>boAt|DC</span>
      <span id="offer">OfferZone</span>
      <select id="more">
        <option value="">More</option>
        <option value="">Daily Deals</option>
        <option value="">Gifting</option>
        <option value="">Do What Floats Your boAt</option>
        <option value="">Meet the boAtheads</option>
        <option value="">Corporate Orders</option>
        <option value="">Earn Rs.100</option>
        <option value="">Careers</option>
      </select>
    </div>
    <div>
      <input id="search" type="text" placeholder="Search" />
      <a href="Login.html">
        <img src="https://cdn.shopify.com/s/files/1/0057/8938/4802/files/navigation-Icon4.png?v=1655206048"
          alt="Login" />
      </a>
      <a href="Gift.html">
        <img src="https://cdn.shopify.com/s/files/1/0057/8938/4802/files/gift.png?v=1606314809" alt="Gift" />
      </a>
      <a href="cart.html">
        <img src="https://cdn.shopify.com/s/files/1/0057/8938/4802/files/navigation-Icon-3.png?v=1655206047"
          alt="Cart" />
      </a>
    </div>
  </nav>

  <main>
    <h1 id="h1">Cash On Delivery Page</h1>
    <hr />

    <section id="nav">
      <input type="text" placeholder="Enter mobile number" id="mobile" />
      <input type="text" placeholder="Enter name" id="name" />
      <input type="text" placeholder="Enter area" id="area" />
      <input type="text" placeholder="Enter pin code" id="pin" />
      <input type="text" placeholder="Locality road" id="road" />
      <button onclick="getdata()" id="cash">Submit</button>
    </section>
  </main>
</body>
<script src="./scripts/cash.js"></script>

</html>
